name: Release

# Builds the plugin from the tagged source and attaches the three artifacts
# Obsidian users install (main.js, manifest.json, styles.css) to a GitHub
# Release. Triggered on tag push so the published artifacts always match
# the tagged source. The build artifacts are NOT committed to the repo —
# they are produced here and attached to the Release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build plugin
        run: npm run build

      - name: Verify build artifacts
        run: |
          set -e
          test -f main.js
          test -f manifest.json
          test -f styles.css
          echo "main.js size: $(wc -c < main.js) bytes"
          # Confirm manifest version matches the tag (strip leading 'v').
          tag="${GITHUB_REF_NAME#v}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Tag ($tag) does not match manifest.json version ($manifest_version)" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            main.js manifest.json styles.css
