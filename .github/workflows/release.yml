name: Release

# Builds the plugin from the tagged source and attaches the three artifacts
# Obsidian users install (main.js, manifest.json, styles.css) to a GitHub
# Release. Triggered on tag push so the published artifacts always match
# the tagged source. The build artifacts are NOT committed to the repo —
# they are produced here and attached to the Release.

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write
  # Required for actions/attest-build-provenance to mint a Sigstore signature.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build plugin
        run: npm run build

      - name: Verify build artifacts
        run: |
          set -e
          test -f main.js
          test -f manifest.json
          test -f styles.css
          echo "main.js size: $(wc -c < main.js) bytes"
          # Obsidian requires the release tag to exactly equal manifest.version
          # (no leading 'v', no suffix). Reject anything else so we never publish
          # a release that fails the community-directory reviewer's check.
          tag="${GITHUB_REF_NAME}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Tag ($tag) does not match manifest.json version ($manifest_version)" >&2
            exit 1
          fi

      - name: Attest build provenance
        # Produces a Sigstore-signed attestation tying each release asset to
        # this workflow run + source commit. Lets users (and the Obsidian
        # reviewer) verify the binary was built from the tagged source via
        # `gh attestation verify <file> --repo icarian-systems/feynman-research-agent`.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            main.js manifest.json styles.css
